version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Evita sobreescribir los módulos de Node instalados en el contenedor
    environment:
      - CHOKIDAR_USEPOLLING=true # Soluciona problemas de hot reload con Vite en Docker de Windows
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Mapea los archivos locales al contenedor para hot reload
    environment:
      - PYTHONUNBUFFERED=1 # Asegura que los logs de Python se envíen stdout en tiempo real

  api:
    build: 
      context: ./api_llm
      dockerfile: Dockerfile
    image: llama-api-gpu
    container_name: llama_api
    ports:
      - "8080:8080"
    volumes:
      - ./api_llm:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]